name: Feature request
description: Suggest an idea or improvement for ThriveMap
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make ThriveMap better. Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your request related to a frustration or missing capability? Describe it.
      placeholder: "Example: I can't tell which countries are best for bisexual travellers specifically."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change as clearly as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Have you considered any alternatives?
      description: Any other approaches or workarounds you've thought about?
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links, examples, or other context that might help.
    validations:
      required: false
